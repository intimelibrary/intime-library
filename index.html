<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인타임 도서관</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header id="header">
  <!-- 시안: 좌상단 펼친 책 아이콘 -->
  <a id="brand-mark" href="#" aria-label="인타임 도서관" title="인타임 도서관">
    <svg viewBox="0 0 40 28" width="40" height="28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M20 6.5C16.5 3.8 12 3.2 8 3.9c-1.1.2-1.9 1.1-1.9 2.2v15.3c0 1.4 1.3 2.4 2.6 2.1 3.6-.7 7.7-.2 11.3 2.2M20 6.5c3.5-2.7 8-3.3 12-2.6 1.1.2 1.9 1.1 1.9 2.2v15.3c0 1.4-1.3 2.4-2.6 2.1-3.6-.7-7.7-.2-11.3 2.2M20 6.5v19.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <!-- ── VIEW NAV (목록 / 색인) — 시안: 제목 없이 맨 위 ── -->
  <nav id="view-nav">
    <button class="nav-link active" data-view="list">목록으로 보기</button>
    <button class="nav-link" data-view="index">색인으로 보기</button>
  </nav>
  <!-- 색인 뷰에서만 보임: 정렬 토글 + 처음으로 (검색 바 자리에 같은 높이로) -->
  <div id="index-bar">
    <span id="tag-index-label">정렬</span>
    <div class="sort-toggle">
      <button data-sort="count" class="active">빈도순</button>
      <button data-sort="abc">ㄱ→ㅎ</button>
      <button data-sort="zyx">ㅎ→ㄱ</button>
    </div>
    <button id="index-reset">↑ 처음으로</button>
  </div>
  <!-- ── 통합 검색 바 (타이핑 검색 + 태그 칩, 시안대로 하나로) ── -->
  <div id="search-bar">
    <div id="tag-bar"></div>
    <input type="search" id="search-input" placeholder="제목, 저자, 디자이너, 발행처 검색…">
    <button id="filter-reset" title="초기화 (검색·태그 모두 지우기)">초기화</button>
    <button id="search-go" aria-label="태그 검색 적용" title="태그 검색">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.6"/>
        <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</header>

<!-- ── 2축 스크롤 테이블 (헤더 상단 고정 · 제목 좌측 고정) ── -->
<div id="table-scroll">
  <div id="col-headers">
    <span class="col-header" data-col="title">제목</span>
    <span class="col-header" data-col="type">유형</span>
    <span class="col-header" data-col="field">분야</span>
    <span class="col-header" data-col="year">연도</span>
    <span class="col-header" data-col="format">판형</span>
    <span class="col-header" data-col="pages">면수</span>
    <span class="col-header" data-col="copies">부수</span>
    <span class="col-header" data-col="paper">종이</span>
    <span class="col-header" data-col="printing">인쇄·후가공</span>
    <span class="col-header" data-col="binding">제본</span>
    <span class="col-header" data-col="author">저자·작가</span>
    <span class="col-header" data-col="editor">기획·편집</span>
    <span class="col-header" data-col="photographer">사진·일러스트</span>
    <span class="col-header" data-col="designer">디자이너</span>
    <span class="col-header" data-col="publisher">발행처</span>
    <span class="col-header" data-col="sponsor">후원</span>
  </div>
  <div id="state-overlay">
    <div class="spinner"></div>
    <p>데이터를 불러오는 중입니다…</p>
  </div>
  <div id="book-list"></div>
  <div id="list-end"></div>
</div>

<!-- ── 색인 보기 뷰 (정렬·처음으로는 헤더의 #index-bar로 이동) ── -->
<div id="tag-index">
  <div id="tag-index-body"></div>
</div>

<script>
// ──────────────────────────────────────────────────────────
// CONFIG — Google Sheets 설정
// ──────────────────────────────────────────────────────────
const CONFIG = {
  // gviz 엔드포인트: "링크가 있는 모든 사용자" 설정만으로 브라우저에서 직접 접근 가능
  SHEET_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSw1uJSia6-gIKDYk_eU5LELanZ9bJC0xWR-XwVYM_ALECuoJS7OgjEwV4PCw6W-QIBOC38t2TCheh/pub?output=csv',

  // 스프레드시트 열 이름 (첫 행 헤더와 정확히 일치)
  COL: {
    collection:   '소장/대여',   // 값 있으면 소장/대여 중(제목 검정), 공란이면 미소장(회색)
    year:         '연도',
    title:        '제목',
    type:         '유형',
    field:        '분야',
    format:       '판형',
    pages:        '면수',
    copies:       '부수',
    language:     '언어',
    paper:        '종이',
    printing:     '인쇄 및 후가공',
    binding:      '제본',
    isbn:         'ISBN/ISSN',
    author:       '저자/작가',
    editor:       '기획자/편집자',
    photographer: '사진가/일러스트레이터',
    designer:     '디자이너',
    publisher:    '발행처',
    publishDate:  '발행일',
    sponsor:      '후원',
  },

  BATCH_SIZE: 80,  // 한 번에 렌더링할 권 수
};

// 열 너비 (CSS grid-template-columns) — 16개 컬럼 한 줄에 모두 표시
// 순서: 제목 유형 분야 연도 판형 면수 부수 종이 인쇄·후가공 제본 저자 기획·편집 사진·일러스트 디자이너 발행처 후원
document.documentElement.style.setProperty(
  '--grid-cols',
  // 제목 유형 분야 연도 판형 면수 부수 종이 인쇄·후가공 제본 저자 기획·편집 사진·일러스트 디자이너 발행처 후원
  // 가로 스크롤 전제 — 각 열을 읽기 편한 고정 px로
  '280px 80px 120px 60px 90px 56px 64px 160px 240px 140px 200px 180px 170px 170px 200px 220px'
);

// ──────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────
let allBooks = [];
let filtered = [];
let renderedCount = 0;
let sortCol = 'title';   // 시작 정렬: 제목
let sortAsc = true;      // 오름차순(↑)
let pendingTags = []; // 선택됐지만 아직 검색 안 된 태그 {field, val}[]
let appliedTags = []; // 실제 필터에 적용된 태그 {field, val}[]
let scrollObserver = null;
let rowVisObserver = null;
let scrollPauseBound = false;

// ──────────────────────────────────────────────────────────
// LOAD DATA
//  - localStorage 캐시가 있으면 즉시 렌더(특히 iPad 콜드 로딩 해소)
//  - 이후 data.csv → 구글 시트 순으로 받아 캐시를 갱신(다음 로드에 반영)
// ──────────────────────────────────────────────────────────
const CACHE_KEY = 'intime_csv_v2';   // 컬럼 구조 변경(소장/대여 등) → 옛 캐시 무시

function saveCache(text) {
  try { localStorage.setItem(CACHE_KEY, text); } catch (_) {}
}

// CSV 텍스트로 렌더 (첫 렌더면 init, 이미 렌더됐으면 건너뜀)
function renderCsv(text, alreadyRendered) {
  if (alreadyRendered) return true;             // 이미 화면이 있으면 재렌더 안 함
  const results = Papa.parse(text, { header: true, skipEmptyLines: true });
  if (!results.data || results.data.length === 0) return false;
  document.getElementById('setup-notice')?.remove();
  allBooks = results.data.map((row, i) => ({ _id: i, ...row }));
  init();
  return true;
}

// ── 로딩 진단(iPad 화면에서 단계·경과시간 확인용) ──
const LOAD_T0 = Date.now();
const loadElapsed = () => ((Date.now() - LOAD_T0) / 1000).toFixed(1);
function setLoadStatus(msg) {
  const p = document.querySelector('#state-overlay p');
  if (p) p.textContent = msg;
  try { console.log(`[load ${loadElapsed()}s] ${msg}`); } catch (_) {}
}

async function loadData() {
  let rendered = false;

  // 0순위: localStorage 캐시 → 즉시 렌더
  setLoadStatus('저장된 데이터 확인 중…');
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      rendered = renderCsv(cached, false);
      if (rendered) setLoadStatus('캐시에서 표시함');
    }
  } catch (_) {}

  // 1순위: 같은 폴더의 data.csv (로컬/같은 서버에 있으면 가장 빠름)
  try {
    setLoadStatus('로컬 데이터(data.csv) 확인 중…');
    const res = await fetch('./data.csv');
    if (res.ok) {
      const text = await res.text();
      saveCache(text);
      renderCsv(text, rendered);
      return;
    }
  } catch (_) {}

  // 2순위: Google Sheets
  if (CONFIG.SHEET_URL) { loadFromSheet(0, rendered); return; }

  if (!rendered) showConnectionError();
}

// 구글 시트 로드 (느린 연결 대비: 타임아웃 + 1회 재시도, 진행상황 표시)
function loadFromSheet(attempt, alreadyRendered) {
  let done = false;
  const TIMEOUT_MS = 25000;
  const MAX_ATTEMPTS = 3;

  // 진행 중 경과시간을 0.5초마다 갱신 표시 (캐시로 이미 보이는 중이면 표시 안 함)
  const ticker = alreadyRendered ? null : setInterval(() => {
    setLoadStatus(`구글 시트에서 불러오는 중… ${loadElapsed()}초 (시도 ${attempt + 1}/${MAX_ATTEMPTS})`);
  }, 500);
  const stop = () => { if (ticker) clearInterval(ticker); };

  const fail = (why) => {
    if (done) return;
    done = true;
    stop();
    clearTimeout(timeout);
    if (attempt + 1 < MAX_ATTEMPTS) {
      if (!alreadyRendered) setLoadStatus(`응답 없음(${why}) — 재시도 중…`);
      setTimeout(() => loadFromSheet(attempt + 1, alreadyRendered), 1200);
    } else if (!alreadyRendered) {
      showConnectionError();
    }
  };

  const timeout = setTimeout(() => fail('시간초과'), TIMEOUT_MS);
  const url = CONFIG.SHEET_URL + (attempt > 0 ? '&_r=' + Date.now() : '');

  Papa.parse(url, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete(results) {
      if (done) return;
      if (!results.data || results.data.length === 0) { fail('빈 데이터'); return; }
      done = true;
      stop();
      clearTimeout(timeout);
      if (!alreadyRendered) setLoadStatus(`데이터 처리 중… (${results.data.length.toLocaleString()}권)`);
      saveCache(Papa.unparse(results.data));   // 다음 로드를 위해 캐시 갱신
      if (!alreadyRendered) {                  // 첫 렌더일 때만 화면 구성
        document.getElementById('setup-notice')?.remove();
        allBooks = results.data.map((row, i) => ({ _id: i, ...row }));
        init();
      }
    },
    error(err) { fail((err && err.message) ? err.message : '네트워크 오류'); }
  });
}

function showConnectionError() {
  document.getElementById('state-overlay')?.remove();

  const notice = document.createElement('div');
  notice.id = 'setup-notice';
  notice.innerHTML = `
    <h3>데이터를 불러올 수 없습니다</h3>
    <p>아래 방법 중 하나로 실행하세요.</p><br>
    <ol>
      <li>
        <strong>방법 A — 로컬 서버 실행</strong> (전시 운영용, 권장)<br>
        Google Sheets에서 <strong>파일 → 다운로드 → CSV</strong>로 저장 →
        파일명을 <code>data.csv</code>로 변경 → <code>index.html</code>과 같은 폴더에 넣기<br>
        터미널에서 해당 폴더로 이동 후:<br>
        <code>python -m http.server 8080</code><br>
        브라우저에서 <code>http://localhost:8080</code> 접속
      </li>
      <li style="margin-top:12px">
        <strong>방법 B — 구글 시트 "웹에 게시"</strong> (인터넷 연결 시)<br>
        Google Sheets → <strong>파일 → 공유 → 웹에 게시</strong> →
        형식: <strong>쉼표로 구분된 값(.csv)</strong> → 게시<br>
        생성된 URL로 <code>index.html</code> 상단의 <code>SHEET_URL</code> 값 교체
      </li>
    </ol>
  `;
  document.querySelector('main').prepend(notice);

  // 샘플 데이터로 레이아웃 미리보기
  allBooks = SAMPLE_DATA.map((row, i) => ({ _id: i, ...row }));
  init();
}

// ──────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────
function init() {
  bindEvents();
  bindTagIndexEvents();
  // 초기 정렬 표시: 제목 오름차순(↑)
  const initHeader = document.querySelector(`.col-header[data-col="${sortCol}"]`);
  if (initHeader) { initHeader.classList.add('sorted'); if (!sortAsc) initHeader.classList.add('desc'); }
  applyFilters();
  document.getElementById('state-overlay')?.remove();

  setupScrollObserver();
}

function setupScrollObserver() {
  if (scrollObserver) scrollObserver.disconnect();
  scrollObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) renderMore();
  }, { root: document.getElementById('table-scroll'), rootMargin: '400px' });
  scrollObserver.observe(document.getElementById('list-end'));
  bindScrollPause();
}

// 마퀴(흐르는 텍스트)는 마우스 기기(데스크톱)에서만 — 터치(iPad)는 스크롤 성능 위해 끔
const FINE_POINTER = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

// 행 가시성 옵저버 — 보이는 행만 측정·애니메이션(.in-view), 벗어나면 정지
// 터치 기기도 실행: 오버플로우 셀에 .marquee 부여 → pointer-events:none → 태그 직접 클릭 차단
function setupRowVisObserver() {
  if (rowVisObserver) rowVisObserver.disconnect();
  rowVisObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const row = e.target;
      if (e.isIntersecting) {
        if (row.dataset.mq !== '1') { measureRowMarquee(row); row.dataset.mq = '1'; }
        row.classList.add('in-view');
      } else {
        row.classList.remove('in-view');
      }
    });
  }, { root: document.getElementById('table-scroll'), rootMargin: '150px 0px' });
}

// 스크롤 중에는 마퀴 일시정지 → 스크롤 프레임 확보(매끄럽게). 제목 마퀴 때문에 터치도 필요
function bindScrollPause() {
  if (scrollPauseBound) return;
  scrollPauseBound = true;
  const ts = document.getElementById('table-scroll');
  let t = null;
  ts.addEventListener('scroll', () => {
    ts.classList.add('scrolling');
    clearTimeout(t);
    t = setTimeout(() => ts.classList.remove('scrolling'), 140);
  }, { passive: true });
}

// ──────────────────────────────────────────────────────────
// EVENTS
// ──────────────────────────────────────────────────────────
function bindEvents() {
  document.getElementById('search-input').addEventListener('input', debounce(() => {
    applyFilters();
  }, 200));

  document.getElementById('filter-reset').addEventListener('click', resetFilters);

  // 통합 검색 바: 돋보기 = 태그 검색 적용, 빈 영역 클릭 = 타이핑 검색 포커스
  document.getElementById('search-go').addEventListener('click', applyTagSearch);
  document.getElementById('search-bar').addEventListener('click', e => {
    if (e.target.closest('.tag-chip, #search-go, #filter-reset')) return;
    document.getElementById('search-input').focus();
  });

  document.querySelectorAll('.col-header').forEach(el => {
    el.addEventListener('click', () => {
      const col = el.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = true; }
      document.querySelectorAll('.col-header').forEach(h => h.classList.remove('sorted','desc'));
      el.classList.add('sorted');
      if (!sortAsc) el.classList.add('desc');
      applyFilters();
    });
  });

  // 이벤트 위임 — 태그 클릭 / 넘치는 셀 펼치기
  const list = document.getElementById('book-list');

  list.addEventListener('click', e => {
    // 1) 팝오버 내부 태그 클릭 → pendingTags에 토글 (팝오버 유지)
    const popTag = e.target.closest('.cell-popover .cell-tag');
    if (popTag && popTag.dataset.val) { togglePendingTag(popTag.dataset.field, popTag.dataset.val); return; }
    // 팝오버 빈 영역 클릭 → 유지
    if (e.target.closest('.cell-popover')) return;
    // 2) 팝오버 열려 있으면 다른 곳 클릭 시 닫기
    if (document.querySelector('.cell-popover')) { closeOpenCell(); return; }

    const cell = e.target.closest('.cell');
    if (!cell) return;
    // 3) 넘침 여부를 클릭 시점에 측정
    const inner = cell.firstElementChild;
    const overflows = inner && (inner.scrollWidth - cell.clientWidth > 4);
    if (overflows) { openCell(cell); return; }
    // 4) 안 넘치는 셀의 태그 → pendingTags에 토글
    const tagEl = e.target.closest('.cell-tag');
    if (tagEl && tagEl.dataset.val) togglePendingTag(tagEl.dataset.field, tagEl.dataset.val);
  });

  // 팝오버 바깥(헤더 등) 클릭 시 닫기
  document.addEventListener('click', e => {
    if (document.querySelector('.cell-popover') &&
        !e.target.closest('.cell-popover') && !e.target.closest('.book-row')) {
      closeOpenCell();
    }
  });
  // 마퀴는 행이 화면에 보일 때만 rowVisObserver가 측정·동작시킴
}

// 넘치는 셀을 클릭하면 그 자리에서 내용 크기만큼 팝오버로 펼침 (이웃 셀 보존)
function openCell(cell) {
  closeOpenCell();
  const row = cell.closest('.book-row');
  const left = cell.getBoundingClientRect().left - row.getBoundingClientRect().left;

  const pop = document.createElement('div');
  pop.className = 'cell-popover';
  pop.style.left = left + 'px';
  pop.style.setProperty('--pop-left', left + 'px');

  const tags = cell.querySelectorAll('.cell-tag');
  if (tags.length) {
    const pendingSet = new Set(pendingTags.map(t => t.field + '|' + t.val));
    tags.forEach(t => {
      const clone = t.cloneNode(true);
      clone.classList.toggle('tag-selected', pendingSet.has(clone.dataset.field + '|' + clone.dataset.val));
      pop.appendChild(clone);
    });
  } else {
    const txt = document.createElement('span');
    txt.className = 'popover-text';
    txt.textContent = cell.textContent.trim();               // 텍스트 셀(제목 등) 전체 표시
    pop.appendChild(txt);
  }

  row.appendChild(pop);
  cell.classList.add('open');
  requestAnimationFrame(() => pop.classList.add('visible'));  // 부드러운 등장
}

function closeOpenCell() {
  document.querySelectorAll('.cell-popover').forEach(p => p.remove());
  document.querySelectorAll('.cell.open').forEach(c => c.classList.remove('open'));
}

// ──────────────────────────────────────────────────────────
// FILTER & SORT
// ──────────────────────────────────────────────────────────
function applyFilters() {
  const C = CONFIG.COL;
  const q = document.getElementById('search-input').value.toLowerCase().trim();

  // 태그 필터 그루핑: 같은 카테고리 OR, 카테고리 간 AND (filter 밖에서 한 번만 계산)
  //  - 값 태그(exact): 세미콜론 분리 후 포함 여부
  //  - 구간 태그(range, 면수·부수): 숫자 범위 포함 여부 [lo, hi)
  const exactByField = {};
  const rangeByField = {};
  for (const t of appliedTags) {
    if (t.range) (rangeByField[t.field] ||= []).push(t.range);
    else         (exactByField[t.field] ||= []).push(t.val);
  }
  const exactEntries = Object.entries(exactByField);
  const rangeEntries = Object.entries(rangeByField);

  filtered = allBooks.filter(b => {
    if (q) {
      const searchable = [
        b[C.title], b[C.author], b[C.editor], b[C.designer],
        b[C.publisher], b[C.isbn], b[C.photographer], b[C.sponsor]
      ].map(v => (v || '').toLowerCase()).join(' ');
      if (!searchable.includes(q)) return false;
    }

    // 값 태그 필터: 같은 카테고리 OR, 카테고리 간 AND
    // 가상 필드(finish 등)는 실제 컬럼값을 정규화해서 매칭 → "박"이 표지에 박·자켓에 박… 합집합
    for (const [fieldKey, vals] of exactEntries) {
      const vf = VFIELDS[fieldKey];
      const colName = vf ? CONFIG.COL[vf.col] : CONFIG.COL[fieldKey];
      if (!colName) continue;
      let parts = (b[colName] || '').split(';').map(s => s.trim());
      if (vf && vf.norm) parts = parts.map(vf.norm);
      if (!vals.some(v => parts.includes(v))) return false;
    }
    // 구간 태그 필터: 숫자값이 선택 구간 중 하나에 들면 통과 [lo, hi)
    for (const [fieldKey, ranges] of rangeEntries) {
      const colName = CONFIG.COL[fieldKey];
      if (!colName) continue;
      const num = parseFloat((b[colName] || '').replace(/[^\d.]/g, ''));
      if (isNaN(num)) return false;
      if (!ranges.some(([lo, hi]) => num >= lo && (hi == null || num < hi))) return false;
    }

    return true;
  });

  // Sort — sortCol은 col-header의 data-col 값(= CONFIG.COL의 키)
  const sortKey = C[sortCol] || C.year;
  const numericCols = ['year', 'pages', 'copies'];
  const isNum = numericCols.includes(sortCol);
  const isFormat = sortCol === 'format';
  // 판형: "가로x세로"에서 첫 숫자쌍을 뽑아 면적(가로×세로) 계산
  const area = (s) => {
    const m = s.match(/(\d+(?:\.\d+)?)\s*[x×X*]\s*(\d+(?:\.\d+)?)/);
    return m ? parseFloat(m[1]) * parseFloat(m[2]) : null;
  };
  filtered.sort((a, b) => {
    const av = (a[sortKey] || '').toString().trim();
    const bv = (b[sortKey] || '').toString().trim();
    // 빈 값은 정렬 방향과 무관하게 항상 맨 아래로
    if (!av && !bv) return 0;
    if (!av) return 1;
    if (!bv) return -1;
    if (isFormat) {
      const aa = area(av), ba = area(bv);
      // 크기를 못 읽는 값(예: "국2절")은 값 있는 책들 중 맨 뒤로
      if (aa == null && ba == null) return av.localeCompare(bv, 'ko');
      if (aa == null) return 1;
      if (ba == null) return -1;
      return sortAsc ? aa - ba : ba - aa;
    }
    if (isNum) {
      const an = parseFloat(av.replace(/[^\d.]/g, '')) || 0;
      const bn = parseFloat(bv.replace(/[^\d.]/g, '')) || 0;
      return sortAsc ? an - bn : bn - an;
    }
    return sortAsc ? av.localeCompare(bv, 'ko') : bv.localeCompare(av, 'ko');
  });

  renderInitial();
}

// ──────────────────────────────────────────────────────────
// RENDER (무한 스크롤)
// ──────────────────────────────────────────────────────────
function renderInitial() {
  renderedCount = 0;
  const list = document.getElementById('book-list');
  list.innerHTML = '';
  document.getElementById('list-end').textContent = '';
  setupRowVisObserver();   // 이전 행 관찰 해제 + 새로 시작

  if (filtered.length === 0) {
    list.innerHTML = `<div id="state-overlay"><p>검색 결과가 없습니다.</p></div>`;
    return;
  }
  renderMore();
}

function renderMore() {
  if (renderedCount >= filtered.length) {
    // 키워드(타이핑) 검색 중일 땐 "— N권 전체 표시 —" 생략
    const hasKeyword = document.getElementById('search-input').value.trim() !== '';
    document.getElementById('list-end').textContent =
      hasKeyword ? '' : `— ${filtered.length.toLocaleString()}권 전체 표시 —`;
    return;
  }
  const C = CONFIG.COL;
  const batch = filtered.slice(renderedCount, renderedCount + CONFIG.BATCH_SIZE);
  renderedCount += batch.length;
  const list = document.getElementById('book-list');
  const newRows = [];

  batch.forEach(book => {
    const row = document.createElement('div');
    row.className = 'book-row';
    row.dataset.id = book._id;

    const v = (col) => (book[C[col]] || '').trim();
    // 소장 열에 값이 없으면 미소장 → 제목 회색 (.not-held)
    if (!v('collection')) row.classList.add('not-held');
    const esc = (s) => (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // 일반 텍스트 셀 (클릭 불가)
    const txtCell = (cls, val) =>
      `<span class="cell ${cls}"><span class="cell-inner">${esc(val) || '—'}</span></span>`;

    // 태그 셀 — ; 구분 다중값을 개별 태그로, 클릭 시 태그 검색
    // transform: 표시 텍스트만 가공 (data-val/필터는 원본 유지)
    const tagCell = (cls, field, val, transform) => {
      const parts = val ? val.split(';').map(s => s.trim()).filter(Boolean) : [];
      const tags = parts.length
        ? parts.map(p => {
            const label = transform ? transform(p) : p;
            return `<span class="cell-tag" data-field="${field}" data-val="${esc(p)}">${esc(label)}</span>`;
          }).join('')
        : '<span class="cell-empty">—</span>';
      return `<span class="cell ${cls}"><span class="cell-inner">${tags}</span></span>`;
    };
    // 제본: 표시에서 "제본" 단어 제거 (예: 무선제본→무선, PUR 제본→PUR)
    const stripBinding = (s) => s.replace(/\s*제본/g, '').trim() || s;

    // 순서: 제목 유형 분야 연도 판형 면수 부수 종이 인쇄·후가공 제본
    //        저자·작가 기획·편집 사진·일러스트 디자이너 발행처 후원
    row.innerHTML = `
      <div class="book-row-main">
        ${txtCell('cell-title',                       v('title'))}
        ${tagCell('cell-type',         'type',        v('type'))}
        ${tagCell('cell-field',        'field',       v('field'))}
        ${txtCell('cell-year',                        v('year'))}
        ${txtCell('cell-format',                      v('format'))}
        ${txtCell('cell-pages',                       v('pages'))}
        ${txtCell('cell-copies',                      v('copies'))}
        ${tagCell('cell-paper',        'paper',       v('paper'))}
        ${tagCell('cell-printing',     'printing',    v('printing'))}
        ${tagCell('cell-binding',      'binding',     v('binding'), stripBinding)}
        ${tagCell('cell-author',       'author',      v('author'))}
        ${tagCell('cell-editor',       'editor',      v('editor'))}
        ${tagCell('cell-photographer', 'photographer', v('photographer'))}
        ${tagCell('cell-designer',     'designer',    v('designer'))}
        ${tagCell('cell-publisher',    'publisher',   v('publisher'))}
        ${tagCell('cell-sponsor',      'sponsor',     v('sponsor'))}
      </div>
    `;

    newRows.push(row);
    list.appendChild(row);
  });

  // 새 행을 가시성 옵저버에 등록 — 화면에 들어올 때만 측정·애니메이션
  newRows.forEach(r => rowVisObserver && rowVisObserver.observe(r));
  // 새로 렌더된 행의 태그에 현재 pending 선택 상태 반영
  updateTagVisuals();
}  // end renderMore

// 한 행의 넘치는 셀을 측정해 마퀴 표시 (행이 처음 보일 때 1회만, 읽기→쓰기 분리)
function measureRowMarquee(row) {
  const cells = [...row.querySelectorAll('.cell')];
  const overflowing = [];
  cells.forEach(cell => {
    const inner = cell.firstElementChild;
    if (!inner) return;
    const overflow = inner.scrollWidth - cell.clientWidth;
    if (overflow > 4) overflowing.push([cell, overflow]);
  });
  overflowing.forEach(([cell, overflow]) => {
    // 첫 글자~마지막 글자까지만 이동(여백 없음), 약 30px/s 균일 속도
    cell.style.setProperty('--mq', `-${overflow}px`);
    cell.style.setProperty('--mq-dur', `${Math.max(1.2, overflow / 30)}s`);
    cell.classList.add('marquee');
  });
}

// 태그 클릭 시 pendingTags에 토글 (필터는 즉시 적용 안 함)
function togglePendingTag(fieldKey, value) {
  if (!value) return;
  const idx = pendingTags.findIndex(t => t.field === fieldKey && t.val === value);
  if (idx >= 0) pendingTags.splice(idx, 1);
  else pendingTags.push({ field: fieldKey, val: value });
  renderTagBar();
  updateTagVisuals();
}

// 태그바 × 버튼으로 개별 태그 제거 → 즉시 재검색(라이브)
function removePendingTag(fieldKey, value) {
  pendingTags = pendingTags.filter(t => !(t.field === fieldKey && t.val === value));
  appliedTags = [...pendingTags];
  renderTagBar();
  updateTagVisuals();
  applyFilters();
}

// 검색 버튼 → 현재 pendingTags를 필터에 적용
function applyTagSearch() {
  appliedTags = [...pendingTags];
  applyFilters();
  document.getElementById('table-scroll').scrollTo({ top: 0, behavior: 'smooth' });
}

// DOM 전체의 .cell-tag에 현재 pendingTags 선택 상태 반영
function updateTagVisuals() {
  const pendingSet = new Set(pendingTags.map(t => t.field + '|' + t.val));
  document.querySelectorAll('.cell-tag').forEach(el => {
    el.classList.toggle('tag-selected', pendingSet.has(el.dataset.field + '|' + el.dataset.val));
  });
}

function renderTagBar() {
  // 통합 검색 바 안에 태그 칩만 인라인으로 (검색은 돋보기 버튼이 담당)
  const bar = document.getElementById('tag-bar');
  bar.innerHTML = '';
  pendingTags.forEach(({ field, val }) => {
    const shownVal = field === 'binding' ? (val.replace(/\s*제본/g, '').trim() || val) : val;
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    const lSpan = document.createElement('span'); lSpan.className = 'tag-chip-label'; lSpan.textContent = TAG_LABELS[field] || field;
    const vSpan = document.createElement('span'); vSpan.className = 'tag-chip-val';   vSpan.textContent = shownVal;
    const xSpan = document.createElement('span'); xSpan.className = 'tag-chip-x';    xSpan.textContent = '×';
    xSpan.addEventListener('click', () => removePendingTag(field, val));
    chip.append(lSpan, vSpan, xSpan);
    bar.appendChild(chip);
  });
}

// 한 열의 값을 세미콜론 분리해 태그별 개수 집계
function tallyField(colName) {
  const map = new Map();
  allBooks.forEach(b => {
    (b[colName] || '').split(';').map(s => s.trim()).filter(Boolean).forEach(v => {
      map.set(v, (map.get(v) || 0) + 1);
    });
  });
  return [...map.entries()].map(([val, count]) => ({ val, count }));
}

// 가상 필드(5분할) 집계 — 컬럼값을 정규화한 뒤 화이트리스트에 든 것만 집계
function subTally(vf) {
  const colName = CONFIG.COL[vf.col];
  const map = new Map();
  allBooks.forEach(b => {
    (b[colName] || '').split(';').map(s => s.trim()).filter(Boolean).forEach(raw => {
      const v = vf.norm ? vf.norm(raw) : raw;
      if (vf.set.has(v)) map.set(v, (map.get(v) || 0) + 1);
    });
  });
  return [...map.entries()].map(([val, count]) => ({ val, count }));
}

// 구간별 권수 집계 (0인 구간은 제외)
function bucketCounts(colName, buckets) {
  return buckets.map(bk => {
    let count = 0;
    allBooks.forEach(b => {
      const n = parseFloat((b[colName] || '').replace(/[^\d.]/g, ''));
      if (!isNaN(n) && n >= bk.lo && (bk.hi == null || n < bk.hi)) count++;
    });
    return { ...bk, count };
  }).filter(bk => bk.count > 0);
}

function sortTagItems(items) {
  const arr = [...items];
  if (SORT_MODE === 'count')      arr.sort((a, b) => b.count - a.count || a.val.localeCompare(b.val, 'ko'));
  else if (SORT_MODE === 'abc')   arr.sort((a, b) => a.val.localeCompare(b.val, 'ko'));
  else                            arr.sort((a, b) => b.val.localeCompare(a.val, 'ko'));
  return arr;
}

// 뷰포트 너비에 맞는 열 개수 (아이패드 세로≈1024 → 3단, 넓은 화면은 시안처럼 6단까지)
function indexColumnCount() {
  const w = window.innerWidth;
  if (w >= 1900) return 6;
  if (w >= 1560) return 5;
  if (w >= 1240) return 4;
  if (w >= 900)  return 3;
  return 2;
}
let idxCols = 0;   // 현재 렌더된 열 개수 (리사이즈 비교용)

function buildTagIndex() {
  const body = document.getElementById('tag-index-body');
  body.innerHTML = '';
  const n = indexColumnCount();
  idxCols = n;
  const cols = [];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'tag-col';
    body.appendChild(c);
    cols.push(c);
  }
  // 실제 렌더되는 카테고리만 순서대로 각 열에 라운드로빈 배분 (열마다 독립)
  let ci = 0;
  TAG_INDEX_CATS.forEach(cat => {
    const block = renderCategoryBlock(cat);
    if (!block) return;                  // 값 없는 카테고리는 건너뜀
    cols[ci % n].appendChild(block);
    ci++;
  });
}

function renderCategoryBlock(cat) {
  let visible = [], hidden = [], isRange = false;

  if (cat.mode === 'range') {
    isRange = true;
    visible = bucketCounts(CONFIG.COL[cat.key], cat.buckets);   // 구간은 항상 자연순, 접기 없음
  } else {
    // 'sub'(가상 필드): 컬럼값을 정규화/화이트리스트로 재분류 집계 / 그 외: 원본 컬럼 집계
    let items = cat.mode === 'sub' ? subTally(VFIELDS[cat.key]) : tallyField(CONFIG.COL[cat.key]);
    if (cat.transform) items = items.map(it => ({ ...it, disp: cat.transform(it.val) }));
    items = sortTagItems(items);
    if (cat.mode === 'all') {
      visible = items;                             // 전부 표시 (연도)
    } else {
      visible = items.slice(0, COLLAPSE_LIMIT);    // 나머지는 20개에서 접기
      hidden  = items.slice(COLLAPSE_LIMIT);
    }
  }

  // 값이 하나도 없는 카테고리는 렌더하지 않음
  if (visible.length === 0 && hidden.length === 0) return null;

  const div = document.createElement('div');
  div.className = 'tag-cat';
  const head = document.createElement('div');
  head.className = 'tag-cat-head';
  head.textContent = cat.label;
  div.appendChild(head);

  const list = document.createElement('div');
  list.className = 'tag-cat-list';

  visible.forEach(it => list.appendChild(makeTagItem(cat.key, it, isRange)));
  // 접힌 항목은 DOM에 미리 넣지 않고 "더보기" 클릭 시 생성 (초기 DOM 경량화)
  if (hidden.length) {
    const more = document.createElement('div');
    more.className = 'tag-more';
    more.textContent = `… ${hidden.length}개 더보기`;
    more._hidden = hidden;
    more._field = cat.key;
    list.appendChild(more);
  }

  div.appendChild(list);
  return div;
}

// 태그 항목 DOM 하나 생성
function makeTagItem(field, it, isRange) {
  const el = document.createElement('div');
  el.className = 'tag-item';
  el.dataset.field = field;
  if (isRange) {
    el.dataset.range = it.lo + ',' + (it.hi == null ? '' : it.hi);
    el.dataset.label = it.label;
  } else {
    el.dataset.val = it.val;
  }
  const nameSpan = document.createElement('span');
  nameSpan.className = 'tag-item-name';
  nameSpan.textContent = it.disp != null ? it.disp : (it.label != null ? it.label : it.val);
  const cntSpan = document.createElement('span');
  cntSpan.className = 'tag-item-count';
  cntSpan.textContent = '(' + it.count + ')';
  el.append(nameSpan, cntSpan);
  return el;
}

// 태그 클릭 → 즉시 단일 검색 후 메인으로 이동
function applySingleTag(tag) {
  pendingTags = [tag];
  appliedTags = [tag];
  renderTagBar();
  applyFilters();
  showMainView();
  document.getElementById('table-scroll').scrollTo({ top: 0 });
}

function setNavActive(view) {
  document.querySelectorAll('.nav-link').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view));
}
function showTagIndex() {
  buildTagIndex();
  document.body.classList.add('view-index');
  setNavActive('index');
  document.getElementById('tag-index').scrollTop = 0;
}
function showMainView() {
  document.body.classList.remove('view-index');
  setNavActive('list');
}

function bindTagIndexEvents() {
  document.querySelectorAll('.nav-link').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.view === 'index') showTagIndex();
      else showMainView();
    });
  });

  // 인덱스 "처음으로" — 펼침(더보기) 접고 맨 위로 스크롤 (정렬은 유지)
  document.getElementById('index-reset').addEventListener('click', () => {
    buildTagIndex();
    document.getElementById('tag-index').scrollTop = 0;
  });

  // 너비가 바뀌어 열 개수가 달라지면 인덱스 뷰만 재구성 (펼침 상태는 초기화됨)
  window.addEventListener('resize', debounce(() => {
    if (document.body.classList.contains('view-index') && indexColumnCount() !== idxCols) {
      buildTagIndex();
    }
  }, 200));

  // 정렬 토글
  document.querySelectorAll('.sort-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (SORT_MODE === btn.dataset.sort) return;
      SORT_MODE = btn.dataset.sort;
      document.querySelectorAll('.sort-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildTagIndex();
    });
  });

  // 태그/더보기 클릭 (이벤트 위임)
  document.getElementById('tag-index-body').addEventListener('click', e => {
    const more = e.target.closest('.tag-more');
    if (more) {
      const frag = document.createDocumentFragment();
      (more._hidden || []).forEach(it => frag.appendChild(makeTagItem(more._field, it, false)));
      more.parentElement.insertBefore(frag, more);
      more.remove();
      return;
    }
    const item = e.target.closest('.tag-item');
    if (!item) return;
    const field = item.dataset.field;
    if (item.dataset.range !== undefined) {
      const [lo, hi] = item.dataset.range.split(',');
      applySingleTag({ field, range: [parseFloat(lo), hi === '' ? null : parseFloat(hi)], val: item.dataset.label });
    } else {
      applySingleTag({ field, val: item.dataset.val });
    }
  });
}

// UTILS
// ──────────────────────────────────────────────────────────
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}
